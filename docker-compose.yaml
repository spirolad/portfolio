version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      db:
        condition: service_healthy
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/portfolio
      - QUARKUS_DATASOURCE_USERNAME=portfolio
      - QUARKUS_DATASOURCE_PASSWORD=portfolio
      - QUARKUS_FLYWAY_MIGRATE_AT_START=false
      - QUARKUS_HTTP_PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db-data:
